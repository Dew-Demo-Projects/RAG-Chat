services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: genealogy-postgres
    environment:
      POSTGRES_DB: genealogy
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
